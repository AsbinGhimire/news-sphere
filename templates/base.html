<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GlobalNews - Professional News Portal{% endblock %}</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="{% block meta_description %}GlobalNews provides the latest world, tech, sports, and business news with professional integrity.{% endblock %}">
    <meta name="robots" content="index, follow">

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{% block og_title %}GlobalNews Portal{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Your source for professional journalism.{% endblock %}">
    <meta property="og:image" content="{% block og_image %}/static/images/logo.png{% endblock %}">

    <link rel="stylesheet" href="/static/css/style.css?v=1.6">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@400;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">

    <!-- FontAwesome for Professional Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    {% block extra_head %}{% endblock %}
</head>
<body>
    <div id="scroll-progress"></div>
    <button id="back-to-top" title="Navigate to Top">↑</button>

    <!-- ========== NAVBAR ========== -->
    {% include "partials/navbar.html" %}

    <!-- ========== MAIN CONTENT ========== -->
    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <!-- ========== FOOTER ========== -->
    {% include "partials/footer.html" %}

    <script src="/static/js/main.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
