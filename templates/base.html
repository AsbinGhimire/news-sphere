<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GlobalNews - Professional News Portal{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header-main">
        <div class="container">
            <a href="/" class="logo">Global<span>News</span></a>
        </div>
    </header>

    <nav class="navbar">
        <div class="container">
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/category/World/">World</a></li>
                <li><a href="/category/Tech/">Tech</a></li>
                <li><a href="/category/Sports/">Sports</a></li>
                <li><a href="/category/Business/">Business</a></li>
                <li><a href="/admin/">Admin Portal</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 GlobalNews - Professional Independent Journalism. All rights reserved.</p>
        </div>
    </footer>

    <script src="/static/js/main.js"></script>
</body>
</html>
