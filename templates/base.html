<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GlobalNews - Professional News Portal{% endblock %}</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="{% block meta_description %}GlobalNews provides the latest world, tech, sports, and business news with professional integrity.{% endblock %}">
    <meta name="robots" content="index, follow">

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{% block og_title %}GlobalNews Portal{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Your source for professional journalism.{% endblock %}">
    <meta property="og:image" content="{% block og_image %}/static/images/logo.png{% endblock %}">
    
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header-main">
        <div class="container header-content">
            <div class="header-left">
                <a href="/" class="logo">Global<span>News</span></a>
            </div>
            <div class="header-right">
                <form action="{% url 'search_view' %}" method="get" class="search-form">
                    <input type="text" name="q" placeholder="Search news..." aria-label="Search" required>
                    <button type="submit">Search</button>
                </form>
            </div>
        </div>
    </header>

    <nav class="navbar">
        <div class="container">
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/category/World/">World</a></li>
                <li><a href="/category/Tech/">Tech</a></li>
                <li><a href="/category/Sports/">Sports</a></li>
                <li><a href="/category/Business/">Business</a></li>
                <li><a href="/admin/">Admin Portal</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 GlobalNews - Professional Independent Journalism. All rights reserved.</p>
        </div>
    </footer>

    <script src="/static/js/main.js"></script>
</body>
</html>
